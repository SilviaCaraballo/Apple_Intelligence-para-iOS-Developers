<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090E;--bg-card:#0E1018;--bg-code:#060810;
  --border:#1A1D2E;--border2:#242840;
  --text:#EEF2FF;--text-muted:#7A849E;--text-subtle:#3D4560;
  --purple:#BF5AF2;--indigo:#5E5CE6;--blue:#64D2FF;
  --green:#30D158;--orange:#FF9F0A;--red:#FF453A;
  --grad:linear-gradient(135deg,#BF5AF2,#5E5CE6,#64D2FF)
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.75;font-size:16px}
h1,h2,h3,h4{font-weight:600;letter-spacing:-0.02em;line-height:1.2}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:840px;margin:0 auto;padding:0 1.5rem}
.container-wide{max-width:1100px;margin:0 auto;padding:0 1.5rem}

/* Progress bar */
#progress{position:fixed;top:0;left:0;height:2px;background:var(--grad);z-index:300;transition:width .1s linear;width:0}

/* Nav */
.nav{position:sticky;top:0;z-index:200;background:rgba(8,9,14,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.65rem 0}
.nav-inner{display:flex;align-items:center;gap:1.5rem}
.nav-logo{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;list-style:none;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav-links::-webkit-scrollbar{display:none}
.nav-links a{display:block;padding:.3rem .65rem;font-size:.78rem;color:var(--text-muted);white-space:nowrap;border-radius:6px;transition:color .15s,background .15s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,.05);text-decoration:none}
.nav-links a.active{color:var(--purple)}

/* Hero */
.hero{padding:6rem 0 4rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% -5%,rgba(94,92,230,.14) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:1px;height:60px;background:linear-gradient(to bottom,transparent,var(--border))}
.hero-tag{display:inline-flex;align-items:center;gap:.5rem;background:rgba(94,92,230,.1);border:1px solid rgba(94,92,230,.28);border-radius:100px;padding:.3rem 1rem;font-size:.75rem;color:#a0a0e8;margin-bottom:1.5rem;letter-spacing:.06em;text-transform:uppercase}
.hero-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.hero h1{font-family:'Fraunces',serif;font-optical-sizing:auto;font-size:clamp(2.4rem,7vw,4.4rem);font-weight:700;background:linear-gradient(140deg,#F0F4FF 0%,var(--purple) 45%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.25rem;line-height:1.1}
.hero-sub{font-size:1.1rem;color:var(--text-muted);max-width:560px;margin:0 auto 2rem;font-weight:300}
.hero-meta{display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--text-subtle);margin-bottom:1.75rem}
.hero-badges{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:.28rem .65rem;font-size:.73rem;color:var(--text-muted)}

/* Sections */
.section{padding:5rem 0;border-top:1px solid var(--border)}
.section-number{font-family:'Fraunces',serif;font-optical-sizing:auto;font-size:5rem;font-weight:700;line-height:1;background:linear-gradient(135deg,var(--purple),var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;margin-bottom:.1rem;letter-spacing:-.04em}
.section-title{font-size:clamp(1.5rem,4vw,2.1rem);margin-bottom:.6rem;color:var(--text)}
.section-desc{color:var(--text-muted);font-size:1rem;max-width:620px;line-height:1.7}
.section-header{margin-bottom:2.5rem}

/* Prose */
.prose p{margin-bottom:1.2rem;color:var(--text-muted)}
.prose p:last-child{margin-bottom:0}
.prose h3{font-size:1.15rem;margin:2rem 0 .7rem;color:var(--text)}
.prose strong{color:var(--text);font-weight:500}
.prose code{font-family:'JetBrains Mono',monospace;font-size:.83em;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:4px;padding:.1em .4em;color:var(--blue)}
.prose ul{margin:.75rem 0 1rem 1.25rem}
.prose ul li{margin-bottom:.4rem;color:var(--text-muted)}

/* Code Block */
.code-block{background:var(--bg-code);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:1.5rem 0;font-family:'JetBrains Mono',monospace}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border)}
.code-filename{font-size:.75rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.code-dots{display:flex;gap:5px}
.code-dot{width:10px;height:10px;border-radius:50%}
.code-body{padding:1.2rem 1.25rem;overflow-x:auto;font-size:.79rem;line-height:1.75;tab-size:4}
.code-body pre{margin:0;white-space:pre}
.code-body .k{color:#C586C0}
.code-body .t{color:#4EC9B0}
.code-body .s{color:#CE9178}
.code-body .c{color:#6A9955;font-style:italic}
.code-body .a{color:#9CDCFE}
.code-body .n{color:#B5CEA8}
.code-body .p{color:#FFD700}

/* Callout */
.callout{border-left:3px solid;border-radius:0 8px 8px 0;padding:.9rem 1.15rem;margin:1.5rem 0;background:rgba(255,255,255,.02)}
.callout-tip{border-color:var(--green)}.callout-tip .ct{color:var(--green)}
.callout-info{border-color:var(--blue)}.callout-info .ct{color:var(--blue)}
.callout-warn{border-color:var(--orange)}.callout-warn .ct{color:var(--orange)}
.ct{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem}
.callout p{color:var(--text-muted);font-size:.88rem;margin:0;line-height:1.6}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.9rem;margin:1.5rem 0}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;transition:border-color .2s}
.card:hover{border-color:rgba(94,92,230,.4)}
.card-icon{font-size:1.4rem;margin-bottom:.65rem;display:block}
.card h4{font-size:.9rem;font-weight:500;color:var(--text);margin-bottom:.3rem}
.card p{font-size:.8rem;color:var(--text-muted);line-height:1.5}

/* Arch diagram */
.arch{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin:1.5rem 0}
.arch-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-subtle);margin-bottom:1rem;text-align:center}
.arch-row{display:flex;gap:.65rem;align-items:center;justify-content:center;flex-wrap:wrap;margin:.5rem 0}
.arch-node{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:.45rem .85rem;font-size:.77rem;color:var(--text-muted);text-align:center;line-height:1.4}
.arch-node.hi{border-color:rgba(191,90,242,.45);color:var(--purple);background:rgba(191,90,242,.06)}
.arch-arrow{color:var(--text-subtle);font-size:1rem}

/* Footer */
.footer{padding:3.5rem 0;border-top:1px solid var(--border);text-align:center}
.footer p{color:var(--text-subtle);font-size:.82rem;margin-bottom:.35rem}

/* Divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:2rem 0}

/* Responsive */
@media(max-width:640px){
  .hero{padding:4rem 0 3rem}
  .section{padding:3.5rem 0}
  .section-number{font-size:3.5rem}
  .code-body{font-size:.72rem;padding:.9rem 1rem}
  .cards{grid-template-columns:1fr 1fr}
  .nav-links a{padding:.28rem .5rem;font-size:.72rem}
}
@media(max-width:400px){.cards{grid-template-columns:1fr}}
</style>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Swift syntax highlighter ──────────────────────────────────────────────────
function hl(raw) {
  const KW = 'import|struct|class|enum|actor|func|var|let|if|else|guard|return|async|await|throws|try|for|in|while|switch|case|break|continue|nil|true|false|self|init|static|private|public|internal|final|override|mutating|nonisolated|some|any|where|extension|protocol|typealias|Task|do|catch|throw|default|defer|repeat|is|as|weak|lazy|open|fileprivate|rethrows|inout|subscript|willSet|didSet|isolated|sending|consuming|borrowing|copy|discard|each|repeat';
  const escaped = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const comments = [], strings = [];
  let r = escaped;
  r = r.replace(/(\/\/[^\n]*)/g, m => { comments.push(m); return `\x00C${comments.length-1}\x00`; });
  r = r.replace(/("(?:[^"\\]|\\.)*")/g, m => { strings.push(m); return `\x00S${strings.length-1}\x00`; });
  r = r.replace(/(@\w+)/g,'<span class="a">$1</span>');
  r = r.replace(new RegExp(`\\b(${KW})\\b`,'g'),'<span class="k">$1</span>');
  r = r.replace(/\b([A-Z][a-zA-Z0-9_]+)\b/g,'<span class="t">$1</span>');
  r = r.replace(/\b(\d+\.?\d*)\b/g,'<span class="n">$1</span>');
  strings.forEach((s,i) => { r = r.split(`\x00S${i}\x00`).join(`<span class="s">${s}</span>`); });
  comments.forEach((c,i) => { r = r.split(`\x00C${i}\x00`).join(`<span class="c">${c}</span>`); });
  return r;
}

// ── Shared UI components ──────────────────────────────────────────────────────
function CodeBlock({ filename, code }) {

        <span className="code-filename">{filename}</span>

}

function Callout({ type='info', title, children }) {

}

// ── INTRO ─────────────────────────────────────────────────────────────────────

// ── SECTION 1: App Intents ────────────────────────────────────────────────────
function AppIntentsSection() {
  const codeModel = `import Foundation

// MARK: - Modelo base de NoteAssist

struct Note: Identifiable, Sendable {
    let id: UUID
    var title: String
    var content: String
    var createdAt: Date

    init(title: String, content: String) {
        self.id = UUID()
        self.title = title
        self.content = content
        self.createdAt = Date()
    }
}`;

  const codeCreate = `import AppIntents

// MARK: - Intent para crear una nota

struct CreateNoteIntent: AppIntent {
    static var title: LocalizedStringResource = "Crear Nota"
    static var description = IntentDescription(
        "Crea una nueva nota inteligente en NoteAssist",
        categoryName: "Notas"
    )

    @Parameter(title: "Título", description: "Título de la nota")
    var noteTitle: String

    @Parameter(title: "Contenido", description: "Contenido principal de la nota")
    var content: String

    @Parameter(title: "Etiqueta", description: "Categoría opcional")
    var tag: String?

    @MainActor
    func perform() async throws -> some IntentResult & ProvidesDialog {
        let store = NoteStore.shared
        let note = Note(title: noteTitle, content: content)
        try await store.addNote(note)
        return .result(dialog: "Nota '\\(noteTitle)' creada correctamente.")
    }
}`;

  const codeSearch = `import AppIntents

// MARK: - Intent para buscar notas

struct SearchNotesIntent: AppIntent {
    static var title: LocalizedStringResource = "Buscar Notas"

    @Parameter(title: "Búsqueda", requestValueDialog: "¿Qué nota buscas?")
    var query: String

    @MainActor
    func perform() async throws -> some IntentResult & ProvidesDialog {
        let results = await NoteStore.shared.search(query: query)
        let dialog = results.isEmpty
            ? "No encontré notas para '\\(query)'"
            : "Encontré \\(results.count) nota(s) sobre '\\(query)'"
        return .result(dialog: IntentDialog(stringLiteral: dialog))
    }
}

// MARK: - Registro de App Shortcuts con Siri

struct NoteAssistShortcuts: AppShortcutsProvider {
    static var appShortcuts: [AppShortcut] {
        AppShortcut(
            intent: CreateNoteIntent(),
            phrases: [
                "Crear nota en \\(.applicationName)",
                "Nueva nota en \\(.applicationName)",
                "Añadir nota a \\(.applicationName)"
            ],
            shortTitle: "Crear Nota",
            systemImageName: "note.text.badge.plus"
        )
        AppShortcut(
            intent: SearchNotesIntent(),
            phrases: [
                "Buscar en \\(.applicationName)",
                "Buscar nota en \\(.applicationName)"
            ],
            shortTitle: "Buscar Notas",
            systemImageName: "magnifyingglass"
        )
    }
}`;

  return (
    <section className="section" id="app-intents">
      <div className="container">
        <div className="section-header">
          <span className="section-number">01</span>
          <h2 className="section-title">App Intents para integración con Siri</h2>
          <p className="section-desc">
            Expón acciones de tu app al sistema operativo para que Apple Intelligence las active
            mediante comandos de voz en lenguaje natural, sin frases rígidas.
          </p>
        </div>

        <div className="prose">
          <p>
            Los <strong>App Intents</strong> son la forma moderna de integrar tu app con Siri,
            Spotlight y los atajos del sistema. Con Apple Intelligence, el modelo de lenguaje
            de Apple puede mapear peticiones en lenguaje natural a tus intents
            <em> automáticamente</em>, lo que significa que el usuario puede decir cosas como
            "apunta que tengo reunión el viernes" y Siri sabrá invocar <code>CreateNoteIntent</code>.
          </p>
        </div>

        <div className="cards">
          <Card icon="🎯" title="AppIntent" desc="Struct que define una acción. Implementa perform() con async/await para ejecutar la lógica."/>
          <Card icon="📝" title="@Parameter" desc="Parámetros declarativos. Siri los solicita automáticamente si el usuario no los proporcionó."/>
          <Card icon="⚡" title="AppShortcutsProvider" desc="Registra frases en lenguaje natural que activan tus intents directamente."/>
          <Card icon="🔄" title="ProvidesDialog" desc="Devuelve respuesta hablada a Siri. Combina con ReturnsValue para devolver datos."/>
        </div>

        <div className="prose">
          <h3>Paso 1 — Modelo de datos Sendable</h3>
          <p>
            Con Swift 6 strict concurrency, el modelo debe conformar <code>Sendable</code>
            para cruzar fronteras de concurrencia de forma segura:
          </p>
        </div>
        <CodeBlock filename="Note.swift" code={codeModel}/>

        <div className="prose">
          <h3>Paso 2 — Definir el AppIntent</h3>
          <p>
            Cada acción es un <code>struct</code> que conforma <code>AppIntent</code>.
            Declara los parámetros con <code>@Parameter</code> — el sistema los solicitará
            al usuario si faltan:
          </p>
        </div>
        <CodeBlock filename="CreateNoteIntent.swift" code={codeCreate}/>

        <Callout type="tip" title="@MainActor en perform()">
          Marca <code>perform()</code> con <code>@MainActor</code> cuando necesites acceder a
          stores <code>@Observable</code> o modificar estado de UI. El runtime de App Intents
          gestiona el salto de hilo automáticamente y es completamente compatible con Swift 6.
        </Callout>

        <div className="prose">
          <h3>Paso 3 — Registrar frases con Siri</h3>
          <p>
            <code>AppShortcutsProvider</code> registra las frases que activan cada intent.
            Usa <code>\(.applicationName)</code> para incluir el nombre de la app dinámicamente.
            El sistema registra los shortcuts en el primer lanzamiento, sin código adicional:
          </p>
        </div>
        <CodeBlock filename="NoteAssistShortcuts.swift" code={codeSearch}/>

        <Callout type="info" title="Registro automático">
          No necesitas llamar a ningún método de registro explícito. El sistema detecta
          <code>AppShortcutsProvider</code> en el bundle y registra los shortcuts automáticamente.
          Aparecen en la app Atajos y en los resultados de Spotlight.
        </Callout>
      </div>
    </section>
  );
}

// ── SECTION 2: Writing Tools ──────────────────────────────────────────────────
function WritingToolsSection() {
  const codeView = `import SwiftUI

// MARK: - Editor de notas con Writing Tools

struct NoteEditorView: View {
    @Bindable var viewModel: NoteEditorViewModel

    var body: some View {
        VStack(alignment: .leading, spacing: 0) {

            // Título: modo limitado (solo corrección ortográfica)
            TextField("Título de la nota", text: $viewModel.noteTitle)
                .font(.title2.weight(.semibold))
                .padding(.horizontal)
                .padding(.top)
                .writingToolsBehavior(.limited)

            Divider().padding(.vertical, 8)

            // Contenido: modo completo (reescritura, resumen, tablas…)
            TextEditor(text: $viewModel.noteContent)
                .padding(.horizontal, 10)
                .writingToolsBehavior(.complete)
                .overlay(alignment: .topLeading) {

  const codeActor = `import CoreML
import NaturalLanguage
import Foundation

// MARK: - Actor de clasificación on-device (Swift 6)

actor NoteClassifier {

    // Singleton reutilizable — el modelo cargado es costoso, reutilizarlo es clave
    static let shared: NoteClassifier = try! NoteClassifier()

    private let model: NLModel

    init() throws {
        guard let url = Bundle.main.url(forResource: "NoteClassifier", withExtension: "mlmodelc") else {
            throw ClassifierError.modelNotFound
        }
        self.model = try NLModel(contentsOf: url)
    }

    // MARK: - Clasificación individual

    func classify(text: String) -> NoteCategory {
        let label = model.predictedLabel(for: text)
        return NoteCategory(rawValue: label ?? "") ?? .general
    }

    // MARK: - Clasificación con probabilidades

    func classifyWithConfidence(text: String) -> [(category: NoteCategory, score: Double)] {
        return model
            .predictedLabelHypotheses(for: text, maximumCount: 5)
            .compactMap { label, score -> (NoteCategory, Double)? in
                guard let cat = NoteCategory(rawValue: label) else { return nil }
                return (cat, score)
            }
            .sorted { $0.1 > $1.1 }
    }

    // MARK: - Clasificación paralela con TaskGroup

    func batchClassify(texts: [String]) async -> [NoteCategory] {
        await withTaskGroup(of: (Int, NoteCategory).self) { group in
            for (index, text) in texts.enumerated() {
                group.addTask { (index, await self.classify(text: text)) }
            }
            var results = [Int: NoteCategory]()
            for await (index, category) in group {
                results[index] = category
            }
            // Preservar el orden original
            return texts.indices.map { results[$0] ?? .general }
        }
    }

    enum ClassifierError: Error {
        case modelNotFound
    }
}

import Observation

// MARK: - Clasificación automática con debounce

@Observable
@MainActor
final class SmartNoteViewModel {
    var content: String = "" {
        didSet { scheduleClassification() }
    }
    var detectedCategory: NoteCategory = .general
    var topConfidence: Double = 0
    var isClassifying = false

    private var classificationTask: Task<Void, Never>?

    // Espera 500ms tras el último cambio para no sobrecargar
    private func scheduleClassification() {
        classificationTask?.cancel()
        classificationTask = Task { [weak self] in
            guard let self else { return }
            try? await Task.sleep(for: .milliseconds(500))

            await self.runClassification()

        if let top = results.first {

        }
    }
}`;

// ── SECTION 5: Natural Language ───────────────────────────────────────────────
function NaturalLanguageSection() {
  const codeAnalyzer = `import NaturalLanguage
import Foundation

// MARK: - Actor de análisis lingüístico on-device

actor NoteAnalyzer {

    // MARK: Detección de idioma

    func detectLanguage(of text: String) -> NLLanguage? {
        let recognizer = NLLanguageRecognizer()
        recognizer.processString(text)
        return recognizer.dominantLanguage
    }

    // MARK: Análisis de sentimiento (-1 negativo → +1 positivo)

    func analyzeSentiment(of text: String) -> SentimentResult {
        let tagger = NLTagger(tagSchemes: [.sentimentScore])
        tagger.string = text

        var scores: [Double] = []
        tagger.enumerateTags(
            in: text.startIndex..<text.endIndex,
            unit: .sentence,
            scheme: .sentimentScore
        ) { tag, _ in
            if let tag, let score = Double(tag.rawValue) {
                scores.append(score)
            }
            return true
        }

        guard !scores.isEmpty else { return .neutral }
        let avg = scores.reduce(0, +) / Double(scores.count)

        return switch avg {
        case 0.2...:    .positive(avg)
        case ..<(-0.2): .negative(avg)
        default:        .neutral
        }
    }

    // MARK: Extracción de entidades nombradas (personas, orgs, lugares)

    func extractEntities(from text: String) -> NoteEntities {
        var persons: [String] = [], orgs: [String] = [], places: [String] = []

        let tagger = NLTagger(tagSchemes: [.nameType])
        tagger.string = text

        if let lang = detectLanguage(of: text) {
            tagger.setLanguage(lang, range: text.startIndex..<text.endIndex)
        }

        tagger.enumerateTags(
            in: text.startIndex..<text.endIndex,
            unit: .word,
            scheme: .nameType,
            options: [.omitWhitespace, .joinNames]
        ) { tag, range in
            let entity = String(text[range])
            switch tag {
            case .personalName:     persons.append(entity)
            case .organizationName: orgs.append(entity)
            case .placeName:        places.append(entity)
            default:                break
            }
            return true
        }

        return NoteEntities(persons: persons, organizations: orgs, places: places)
    }

    // MARK: Extracción de palabras clave por frecuencia léxica

    func extractKeywords(from text: String, limit: Int = 8) -> [Keyword] {
        let stopWords: Set<String> = [
            "que","con","para","por","una","uno","los","las","del","este","esta",
            "the","and","for","this","that","with","from","have","they","will"
        ]

        var frequency: [String: Int] = [:]
        let tagger = NLTagger(tagSchemes: [.lexicalClass])
        tagger.string = text

        tagger.enumerateTags(
            in: text.startIndex..<text.endIndex,
            unit: .word,
            scheme: .lexicalClass,
            options: [.omitWhitespace, .omitPunctuation]
        ) { tag, range in
            let isRelevant = tag == .noun || tag == .verb || tag == .adjective
            if isRelevant {
                let word = String(text[range]).lowercased()
                if word.count > 3, !stopWords.contains(word) {
                    frequency[word, default: 0] += 1
                }
            }
            return true
        }

        return frequency
            .sorted { $0.value > $1.value }
            .prefix(limit)
            .map { Keyword(word: $0.key, frequency: $0.value) }
    }

    // MARK: Tokenización en oraciones

    func splitIntoSentences(_ text: String) -> [String] {
        let tokenizer = NLTokenizer(unit: .sentence)
        tokenizer.string = text
        return tokenizer
            .tokens(for: text.startIndex..<text.endIndex)
            .map { String(text[$0]) }
            .filter { !$0.trimmingCharacters(in: .whitespaces).isEmpty }
    }
}

// MARK: - Tipos de resultado

enum SentimentResult: Sendable {
    case positive(Double)
    case negative(Double)
    case neutral

    var emoji: String {
        switch self { case .positive: "😊"; case .negative: "😔"; case .neutral: "😐" }
    }
    var label: String {
        switch self {
        case .positive(let s): "Positivo (\\(Int(s * 100))%)"
        case .negative(let s): "Negativo (\\(Int(abs(s) * 100))%)"
        case .neutral:         "Neutral"
        }
    }
}

struct NoteEntities: Sendable {
    let persons: [String]
    let organizations: [String]
    let places: [String]
    var isEmpty: Bool { persons.isEmpty && organizations.isEmpty && places.isEmpty }
}

struct Keyword: Identifiable, Sendable {
    let id = UUID()
    let word: String
    let frequency: Int
}`;

    }

import Observation

// MARK: - Store central — coordina todas las features de Apple Intelligence

@Observable
@MainActor
final class NoteStore {
    static let shared = NoteStore()

    private(set) var notes: [SmartNote] = []
    private let classifier = NoteClassifier.shared
    private let analyzer   = NoteAnalyzer()

    // MARK: - CRUD

    func addNote(_ note: SmartNote) async throws {
        // 1. Insertar inmediatamente — UI reactiva al instante
        notes.insert(note, at: 0)

        // 2. Enriquecer en background sin bloquear el hilo principal
        Task(priority: .userInitiated) { await enrichNote(note) }
    }

    func updateNote(_ note: SmartNote) async throws {
        guard let idx = notes.firstIndex(where: { $0.id == note.id }) else { return }
        notes[idx] = note
        Task(priority: .background) { await enrichNote(note) }
    }

    func deleteNote(id: UUID) {
        notes.removeAll { $0.id == id }
    }

    func search(query: String) -> [SmartNote] {
        guard !query.isEmpty else { return notes }
        let q = query.lowercased()
        return notes.filter {
            $0.title.lowercased().contains(q)    ||
            $0.content.lowercased().contains(q)  ||
            $0.keywords.contains { $0.contains(q) }
        }
    }

    // MARK: - Enriquecimiento con Apple Intelligence

    private func enrichNote(_ note: SmartNote) async {
        guard note.content.count > 20,
              let idx = notes.firstIndex(where: { $0.id == note.id }) else { return }

        // Análisis en paralelo: Core ML + NL Framework
        async let category  = classifier.classify(text: note.content)
        async let keywords  = analyzer.extractKeywords(from: note.content, limit: 6)
        async let entities  = analyzer.extractEntities(from: note.content)
        let sentiment       = await analyzer.analyzeSentiment(of: note.content)

        // Recoger todos los resultados y actualizar el modelo
        let cat = await category
        let kw  = await keywords
        let ent = await entities

        notes[idx].category         = cat
        notes[idx].keywords         = kw.map { $0.word }
        notes[idx].detectedEntities = ent
        notes[idx].sentiment        = sentiment
    }
}`;

function App() {
  useEffect(() => {
    const ids = ['app-intents','writing-tools','image-playground','core-ml','natural-language','proyecto'];
    const links = document.querySelectorAll('.nav-links a');

    const onScroll = () => {
      const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
      const bar = document.getElementById('progress');
      if (bar) bar.style.width = Math.min(pct, 100) + '%';

      let current = '';
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el && window.scrollY >= el.offsetTop - 130) current = id;
      });
      links.forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + current);
      });
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (

      <WritingToolsSection/>
      <ImagePlaygroundSection/>
      <CoreMLSection/>
